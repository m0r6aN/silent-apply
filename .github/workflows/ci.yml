name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      # Build/test never connect to these — placeholders satisfy config loaders.
      DATABASE_URL: postgresql://user:pass@localhost:5432/silentapply
      DIRECT_URL: postgresql://user:pass@localhost:5432/silentapply
      NEXTAUTH_SECRET: ci-placeholder-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  deploy:
    name: Deploy to Azure Container Apps
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry "${{ secrets.ACR_NAME }}" \
            --image "silentapply:${{ github.sha }}" \
            --image "silentapply:latest" \
            .

      - name: Run database migrations
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm ci
          npx prisma migrate deploy

      - name: Update Container App
        run: |
          az containerapp update \
            --name silentapply \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ secrets.ACR_NAME }}.azurecr.io/silentapply:${{ github.sha }}"
